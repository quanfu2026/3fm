{% extends "base.html" %}
{% block title %}登入{% endblock %}
{% block content %}
<div class="form-card">
  <h2>會員登入</h2>

    <label>帳號<input type="text" name="username" required></label>

  <p style="margin-top:1rem;color:#666">測試帳號：admin / admin123</p>
</div>
{% endblock %}
